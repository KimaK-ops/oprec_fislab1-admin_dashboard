<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cek Pengumuman — Pendaftaran Aslab Fislab 1</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css?family=Work+Sans" rel="stylesheet">
</head>
<body>

<div class="announce-nav">
  <div class="announce-nav-brand">Pendaftaran Asisten Laboratorium I</div>
  <a class="btn-back" href="index.html">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Beranda
  </a>
</div>

<div class="announce-body">

  <div class="confetti-banner confetti-banner-netral">
    <h1>Cek Status Seleksi<br/>Asisten Fisika Laboratorium I</h1>
  </div>

  <div class="cek-status-wrap">
    <form class="cek-status-form" id="form-cek-status" onsubmit="handleCekStatus(event, 'result-status')">
      <label for="nrp-cek-status" class="cek-status-label">Masukkan NRP kamu buat cek status seleksi</label>
      <div class="cek-status-row">
        <input class="cek-status-input" type="text" id="nrp-cek-status" placeholder="5001241xxx" autocomplete="off" />
        <button class="btn-cek-status" type="submit">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Cek Status
        </button>
      </div>
    </form>
    <div class="status-result" id="result-status"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="pengumuman.js"></script>

</body>
</html>
